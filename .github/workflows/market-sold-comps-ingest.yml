# POST /functions/v1/market-comps-ingest on a schedule (UTC).
# Secrets: SUPABASE_MARKET_COMPS_INGEST_URL, LISTING_CRON_SECRET

name: Market sold comps ingest

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST market-sold-comps-ingest
        env:
          URL: ${{ secrets.SUPABASE_MARKET_SOLD_COMPS_INGEST_URL }}
          SECRET: ${{ secrets.LISTING_CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "Missing SUPABASE_MARKET_SOLD_COMPS_INGEST_URL or LISTING_CRON_SECRET repository secrets."
            exit 1
          fi
          curl -fsS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $SECRET" \
            -d '{}'
