# Calls POST /functions/v1/pokemon-card-images-ingest once per day (UTC).
# Repository secrets: SUPABASE_POKEMON_CARD_IMAGES_INGEST_URL, LISTING_CRON_SECRET
# (same cron secret as other scheduled functions).

name: Pokémon card images sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST pokemon-card-images-ingest
        env:
          URL: ${{ secrets.SUPABASE_POKEMON_CARD_IMAGES_INGEST_URL }}
          SECRET: ${{ secrets.LISTING_CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "Missing SUPABASE_POKEMON_CARD_IMAGES_INGEST_URL or LISTING_CRON_SECRET repository secrets."
            exit 1
          fi
          curl -fsS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $SECRET" \
            -d '{}'
